# k8s/base/api.yaml — FastAPI + C++ engine deployment.
#
# Key design decisions:
#   • HorizontalPodAutoscaler scales from 2→10 replicas based on CPU.
#   • Each pod has a memory limit (the C++ engine is fast but can use
#     significant RAM for large datasets).
#   • The /data PVC is mounted ReadOnly so pods can only read CSVs;
#     writes go through the upload endpoint which mounts ReadWrite.
#   • Liveness probe hits /healthz; readiness checks that the port
#     is accepting connections before receiving traffic.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: quant
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: api
          image: your-registry/quant-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quant-config
          resources:
            requests:
              cpu:    "500m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds:       15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds:       5
          volumeMounts:
            - name: data-volume
              mountPath: /data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: quant
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# HorizontalPodAutoscaler — scale API pods based on CPU utilization.
# In production, also add custom metrics (e.g. Redis queue length).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: quant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
