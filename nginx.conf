# nginx.conf
# Serves the React SPA and proxies /api/* and /ws/* to the FastAPI service.
# This config runs INSIDE the frontend container.

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ──────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy (REST) ──────────────────────────────────────
    location ~ ^/(backtests|strategies|data|healthz) {
        proxy_pass         http://api-service:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── WebSocket proxy ───────────────────────────────────────
    location /ws/ {
        proxy_pass         http://api-service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;   # Keep WS alive during long backtests
        proxy_send_timeout 3600s;
    }

    # ── SPA fallback ──────────────────────────────────────────
    # All other routes → index.html (React Router handles them).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
